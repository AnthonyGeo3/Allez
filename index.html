<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Allez — French for Paris</title>
<meta name="theme-color" content="#20337A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Allez!">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2A4A; --soft:#5A6478; --paper:#F6F7F4; --tile:#FFFFFF;
  --bleu:#2A4FD0; --bleu-deep:#20337A; --rouge:#E0312E; --butter:#F2B705;
  --line:#E3E6E0; --ok:#1F8A4C;
  --rad:16px; --shadow:0 1px 2px rgba(27,42,74,.06),0 8px 24px rgba(27,42,74,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Lexend',system-ui,sans-serif; background:var(--paper); color:var(--ink);
  font-size:17px; line-height:1.65; letter-spacing:.01em;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
h1,h2,h3{font-family:'Jost',sans-serif;letter-spacing:.02em;line-height:1.25;margin:0 0 .4em}
h2{font-size:1.35rem;font-weight:600} h3{font-size:1.05rem;font-weight:600}
button{font-family:inherit;font-size:1rem;cursor:pointer;border:none;border-radius:999px;letter-spacing:.01em}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--ink);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--tile);width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:3px solid rgba(42,79,208,.35);outline-offset:2px}

/* header */
header{position:sticky;top:0;z-index:20;background:var(--paper);padding:calc(14px + env(safe-area-inset-top)) 18px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.wordmark{font-family:'Jost';font-weight:700;font-size:1.45rem;letter-spacing:.14em;color:var(--bleu-deep)}
.wordmark .bang{color:var(--rouge)}
.spacer{flex:1}
.streak-pill{display:flex;align-items:center;gap:6px;background:var(--tile);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:600;font-size:.92rem}
.gear{background:none;font-size:1.35rem;padding:6px}

/* layout */
main{max-width:560px;margin:0 auto;padding:18px}
.card{background:var(--tile);border:1.5px solid var(--line);border-radius:var(--rad);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.muted{color:var(--soft);font-size:.95rem}
.row{display:flex;gap:10px;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* the signature: métro enamel plaque */
.plaque{
  background:linear-gradient(180deg,#26418F 0%,var(--bleu-deep) 100%);
  color:#fff;border-radius:14px;padding:22px 20px;text-align:center;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.92), inset 0 0 0 6px var(--bleu-deep), 0 10px 28px rgba(32,51,122,.28);
}
.plaque .fr{font-family:'Jost';font-weight:600;font-size:1.5rem;line-height:1.35;letter-spacing:.025em}
.plaque .phon{margin-top:10px;font-size:1.02rem;color:#FBD55E;letter-spacing:.04em}
.plaque .en{margin-top:8px;font-size:.95rem;color:rgba(255,255,255,.85)}
.plaque.mini{padding:14px 16px;text-align:left}
.plaque.mini .fr{font-size:1.18rem}

/* buttons */
.btn{background:var(--bleu);color:#fff;font-weight:600;padding:14px 22px;min-height:48px}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--tile);color:var(--bleu-deep);border:1.5px solid var(--line)}
.btn.warm{background:var(--rouge)}
.btn.soft{background:#EAEEF9;color:var(--bleu-deep)}
.btn.big{width:100%;font-size:1.08rem;padding:16px}
.btn:disabled{opacity:.45;cursor:default}
.iconbtn{background:var(--tile);border:1.5px solid var(--line);border-radius:999px;width:52px;height:52px;font-size:1.35rem;display:inline-flex;align-items:center;justify-content:center;flex:none}
.iconbtn.rec{border-color:var(--rouge);color:var(--rouge)}
.iconbtn.rec.live{background:var(--rouge);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,49,46,.45)}100%{box-shadow:0 0 0 14px rgba(224,49,46,0)}}

/* learn card flip-ish */
.drill-stage{min-height:230px;display:flex;flex-direction:column;justify-content:center}
.reveal-anim{animation:rise .25s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grade-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.grade-row .btn{padding:13px 6px;font-size:.98rem}
.g-again{background:#F6E3E2;color:#9C2421}.g-good{background:#E4EBFB;color:var(--bleu-deep)}.g-easy{background:#E1F1E7;color:var(--ok)}
.progressbar{height:8px;background:#E9ECE7;border-radius:99px;overflow:hidden;margin-bottom:14px}
.progressbar>div{height:100%;background:var(--bleu);border-radius:99px;transition:width .25s}
.heard{margin-top:10px;font-size:.95rem}
.heard.ok{color:var(--ok);font-weight:600}.heard.no{color:var(--soft)}

/* scenario grid */
.scen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scen{background:var(--tile);border:1.5px solid var(--line);border-radius:var(--rad);padding:16px 14px;text-align:left;box-shadow:var(--shadow)}
.scen .em{font-size:1.7rem;display:block;margin-bottom:6px}
.scen .t{font-weight:600;display:block;font-family:'Jost';font-size:1.04rem}
.scen .s{font-size:.85rem;color:var(--soft)}

/* numbers trainer */
.numgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.numopt{background:var(--tile);border:2px solid var(--line);border-radius:14px;padding:20px 8px;font-family:'Jost';font-weight:700;font-size:1.55rem;color:var(--ink);min-height:74px}
.numopt:active{transform:translateY(1px)}
.numopt.correct{border-color:var(--ok);background:#E1F1E7;color:var(--ok)}
.numopt.wrong{border-color:var(--rouge);background:#F6E3E2;color:#9C2421}
.numopt.dim{opacity:.45}

/* practice area */
.prow{display:block;width:100%;text-align:left;background:var(--tile);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:8px;font-weight:600;font-family:'Jost';color:var(--ink)}
.prow.plvl0{background:#EAEEF9;color:var(--bleu-deep);font-size:1.08rem}
.prow.blvl1{font-size:1rem}
.prow.blvl2{font-weight:500;background:var(--paper);font-size:.95rem}

/* chat */
.chat{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.bub-ai{align-self:flex-start;max-width:92%}
.bub-ai .note{margin-top:6px;font-size:.88rem;color:var(--soft);background:#FFF6DE;border:1.5px solid #F2E2AE;border-radius:10px;padding:8px 12px}
.bub-me{align-self:flex-end;max-width:85%;background:var(--tile);border:1.5px solid var(--line);border-radius:14px 14px 4px 14px;padding:12px 14px}
.bub-me .who{font-size:.78rem;color:var(--soft);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tapline{font-size:.82rem;color:rgba(255,255,255,.75);margin-top:8px}
.chatbar{position:sticky;bottom:calc(76px + env(safe-area-inset-bottom));display:flex;gap:8px;background:var(--paper);padding:8px 0}
.chatbar input{flex:1}
.turnbadge{display:inline-block;background:var(--butter);color:#5C4500;font-weight:600;border-radius:999px;padding:4px 14px;font-size:.9rem;margin-bottom:10px}

/* progress */
.statbig{font-family:'Jost';font-weight:700;font-size:2rem;line-height:1}
.catbar{margin-bottom:12px}
.catbar .lab{display:flex;justify-content:space-between;font-size:.92rem;margin-bottom:4px}
.flame{color:var(--rouge)}

/* bottom nav */
nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--tile);border-top:1.5px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
nav button{background:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.74rem;font-weight:600;color:var(--soft);padding:4px 10px;border-radius:12px;letter-spacing:.03em}
nav button .nem{font-size:1.3rem}
nav button.on{color:var(--bleu-deep);background:#EAEEF9}

/* settings sheet */
.sheet{position:fixed;inset:0;background:rgba(27,42,74,.45);z-index:40;display:none;align-items:flex-end}
.sheet.open{display:flex}
.sheet .panel{background:var(--paper);width:100%;max-height:88vh;overflow:auto;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;font-size:.92rem;margin-bottom:6px}
.profile-switch{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.profile-switch button{padding:14px;border-radius:14px;border:2px solid var(--line);background:var(--tile);font-weight:600;font-size:1.05rem}
.profile-switch button.on{border-color:var(--bleu);background:#EAEEF9;color:var(--bleu-deep)}
.pill-toggle{display:flex;gap:8px}
.pill-toggle button{flex:1;padding:10px;border:1.5px solid var(--line);background:var(--tile);font-weight:600}
.pill-toggle button.on{background:var(--bleu);color:#fff;border-color:var(--bleu)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:.95rem;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.sessiondone{text-align:center;padding:30px 10px}
.sessiondone .em{font-size:3rem}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="wordmark">ALLEZ<span class="bang">&nbsp;!</span></div>

<main id="view"></main>
<nav id="nav"></nav>
<div class="sheet" id="sheet"><div class="panel" id="sheetPanel"></div></div>

<script>
// ---------- UTILS ----------
const $=s=>document.querySelector(s);
const esc=t=>String(t??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const yesterStr=()=>{const d=new Date(Date.now()-864e5);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const norm=t=>String(t||"").toLowerCase().replace(/\d+/g,m=>{const n=parseInt(m,10);return (n>=0&&n<=999)?frNum(n):m}).replace(/€/g," euros ").replace(/£/g," livres ").replace(/\$/g," dollars ").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/œ/g,"oe").replace(/[^a-z0-9]+/g," ").trim();
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;let prev=Array.from({length:n+1},(_,i)=>i);for(let i=1;i<=m;i++){const cur=[i];for(let j=1;j<=n;j++){cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1))}prev=cur}return prev[n]}
const sim=(a,b)=>{a=norm(a);b=norm(b);if(!a||!b)return 0;return 1-lev(a,b)/Math.max(a.length,b.length)};
function wordMarks(target,heardArr){let best="",bs=0;
 for(const h of heardArr){const s=sim(h,target);if(s>=bs){bs=s;best=h}}
 const hw=norm(best).split(" ").filter(Boolean);
 const marks=target.split(/\s+/).map(t=>{const w=norm(t);
  return{t,hit:!w||hw.includes(w)||hw.some(x=>w.length>2&&(1-lev(x,w)/Math.max(x.length,w.length))>=0.7)}});
 return{score:bs,heard:best,marks}}
function passed(r){return r.score>=0.72||(r.marks.length>=2&&r.marks.every(m=>m.hit))}

if("speechSynthesis"in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}

function unlockTTS(){if(TTSOK)return;TTSOK=true;
 try{if("speechSynthesis"in window){const u=new SpeechSynthesisUtterance(" ");u.volume=0;speechSynthesis.speak(u);setTimeout(loadVoices,300)}}catch(e){}

 document.addEventListener("click",unlockTTS,{once:true});document.addEventListener("touchend",unlockTTS,{once:true})}});

function speak(text,slow){if(!("speechSynthesis"in window)){toast("No speech voices on this device");return}
 try{speechSynthesis.cancel();if(!VOICES.length)loadVoices();const u=new SpeechSynthesisUtterance(text);u.lang="fr-FR";const v=frVoice();if(v)u.voice=v;u.rate=slow?Math.max(0.55,S.settings.rate-0.25):S.settings.rate;speechSynthesis.speak(u)}catch(e){}}

function micErr(e){const m=(e&&e.message)||"";
 if(m==="nosr")return "Speech input needs Chrome on this device — use Reveal instead";
 if(m==="not-allowed"||m==="service-not-allowed")return "Mic blocked — allow mic access for this site. On iPhone, also enable Dictation: Settings → General → Keyboard";
 if(m==="audio-capture")return "No microphone found";
 if(m==="no-speech"||m==="silence")return "Didn't catch anything — try again";
 if(m==="network")return "Speech service needs a connection — try Reveal for now";
 return "Mic error — try again or tap Reveal"}
// Recorded-audio path for devices where browser recognition doesn't work (iPhone):
// capture a clip, POST it to the Worker's /stt route (Whisper), hand back the text.
let REC=null,recChunks=[],recStream=null,recTimer=null,RECORDING=false;
async function recToggle(onResult,btn){
 if(!RECORDING){
  try{
   recStream=await navigator.mediaDevices.getUserMedia({audio:true});
   recChunks=[];REC=new MediaRecorder(recStream);
   REC.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data)};
   REC.onstop=async()=>{
    try{recStream.getTracks().forEach(t=>t.stop())}catch(e){}
    const blob=new Blob(recChunks,{type:(recChunks[0]&&recChunks[0].type)||"audio/mp4"});
    try{
     const r=await fetch(sttUrl(),{method:"POST",headers:{"Content-Type":blob.type||"application/octet-stream"},body:blob});
     if(!r.ok)throw new Error("HTTP "+r.status);
     const d=await r.json();if(d.error)throw new Error(d.error);
     onResult((d.text||"").trim(),null);
    }catch(e){onResult(null,e)}
   };
   REC.start();RECORDING=true;btn&&btn.classList.add("live");
   toast("Recording — tap the mic again to stop");
   clearTimeout(recTimer);recTimer=setTimeout(()=>{if(RECORDING)recToggle(onResult,btn)},6000);
  }catch(e){toast(isIOS?"Let Safari use the mic, then tap again":"Mic didn't start — check permission")}
 }else{
  RECORDING=false;clearTimeout(recTimer);btn&&btn.classList.remove("live");toast("Checking…");
  try{REC.stop()}catch(e){}
 }
}

// ---------- SRS ----------
function srsOf(p,id){if(!p.srs[id])p.srs[id]={ease:2.5,iv:0,due:0,reps:0};return p.srs[id]}
function grade(p,id,g){const s=srsOf(p,id);const now=Date.now();s.g=g;
 if(g==="again"){s.reps=0;s.iv=0;s.due=now+60e3;s.ease=Math.max(1.3,s.ease-0.2)}
 else{s.reps++;if(g==="easy"){s.ease=Math.min(3,s.ease+0.1);s.iv=s.iv?Math.round(s.iv*s.ease*1.3):2}else{s.iv=s.iv?Math.round(s.iv*s.ease):1}
 s.due=now+s.iv*864e5}save();syncPush()}
function resetToday(p){const t=todayStr();if(p.today.date!==t){p.today={date:t,newCount:0,cards:0}}}
function buildSession(p,cat){resetToday(p);const eod=new Date();eod.setHours(23,59,59,999);
 const pool=PHRASES.filter(x=>!cat||x.c===cat);
 const due=pool.filter(x=>{const s=p.srs[x.id];return s&&s.due<=eod.getTime()});
 due.sort((a,b)=>p.srs[a.id].due-p.srs[b.id].due);
 const newLeft=Math.max(0,p.newPerDay-p.today.newCount);
 const fresh=pool.filter(x=>!p.srs[x.id]).sort((a,b)=>a.l-b.l).slice(0,newLeft);
 const q=[...due.slice(0,12)];for(const f of fresh){if(q.length>=12)break;q.push(f)}
 return q}
function dueCount(p){const eod=new Date();eod.setHours(23,59,59,999);return PHRASES.filter(x=>{const s=p.srs[x.id];return s&&s.due<=eod.getTime()}).length}

// ---------- STREAKS ----------
function markDone(names){names=names&&names.length?names:[S.profile];const t=todayStr();
 for(const nm of names){const p=S.profiles[nm];if(!p)continue;
  if(p.streak.last!==t){p.streak.n=(p.streak.last===yesterStr())?p.streak.n+1:1;p.streak.last=t}
  if(!S.days[t])S.days[t]={};S.days[t][nm]=true;}
 save();for(const nm of names)syncPush(nm);syncDay(t,names);renderStreak()}
function houseStreak(){let n=0;let d=new Date();const both=ds=>S.days[ds]&&S.days[ds].Anthony&&S.days[ds].Amy;
 const t=todayStr();if(!both(t))d=new Date(Date.now()-864e5);
 for(;;){const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");if(both(ds)){n++;d=new Date(d.getTime()-864e5)}else break}return n}
function renderStreak(){const p=me();const t=todayStr();const alive=(p.streak.last===t||p.streak.last===yesterStr())?p.streak.n:0;
 $("#streakPill").innerHTML=`🔥 ${alive} <span class="muted">·</span> 🏠 ${houseStreak()}`}

let FB=null,fbStatus="Not connected",fbCfgUsed="";
function parseCfg(raw){raw=String(raw).trim().replace(/^(const|var|let)\s+\w+\s*=\s*/,"").replace(/;\s*$/,"");
 try{return JSON.parse(raw)}catch(e){}
 try{const o=(new Function("return ("+raw+")"))();return(o&&typeof o==="object")?o:null}catch(e){return null}}
async function initFB(silent){const cfgRaw=S.settings.fb.trim();if(!cfgRaw){fbStatus="Not connected";return}
 if(FB&&cfgRaw===fbCfgUsed)return;
 if(fbCfgUsed&&cfgRaw!==fbCfgUsed){fbStatus="Config changed — reload the app to apply";if(!silent)toast("Firebase config changed — reload the page to switch");return}
 try{const cfg=parseCfg(cfgRaw);if(!cfg)throw new Error("paste the whole firebaseConfig object, braces included");
  const app=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const fs=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  const a=(app.getApps&&app.getApps().length)?app.getApp():app.initializeApp(cfg);const db=fs.getFirestore(a);const house=S.settings.house||"maison";
  FB={fs,db,prof:n=>fs.doc(db,"allez",house,"profiles",n),houseRef:fs.doc(db,"allez",house)};
  for(const n of NAMES){fs.onSnapshot(FB.prof(n),snap=>{const d=snap.data();if(d&&d.up>(S.upd[n]||0)){S.profiles[n]={...freshProfile(n==="Anthony"?1:2),...d.data};S.upd[n]=d.up;save();if(n===S.profile){renderStreak();if(TAB==="learn"&&!SES)render()}}})}
  FB.fs.onSnapshot(FB.houseRef,snap=>{const d=snap.data();if(d&&d.days){S.days={...S.days,...d.days};save();renderStreak()}});
  fbCfgUsed=cfgRaw;fbStatus="Connected ✓ shared with "+other();if(!silent)toast("Firebase connected — progress now syncs");renderStreak()}
 catch(e){fbStatus="Error: "+(e.message||e);FB=null;if(!silent)toast("Firebase config problem — check SETUP.md")}}
let pushT={};function syncPush(n){n=n||S.profile;if(!FB)return;clearTimeout(pushT[n]);pushT[n]=setTimeout(async()=>{try{const up=Date.now();S.upd[n]=up;await FB.fs.setDoc(FB.prof(n),{data:S.profiles[n],up})}catch(e){}},1200)}
async function syncDay(t,names){names=names&&names.length?names:[S.profile];if(!FB)return;try{const m={};for(const nm of names)m[nm]=true;await FB.fs.setDoc(FB.houseRef,{days:{[t]:m}},{merge:true})}catch(e){}}

// ---------- AI ----------
const DIRECT_MODEL="claude-sonnet-4-20250514";
let aiOK=false;
function levelText(n,lv){return `${n} is level ${lv} — ${lv===1?"absolute beginner: use very short French (3–8 words), simple present tense, everyday words only":lv===2?"rusty GCSE French: short natural sentences, gently stretch them":"confident with basics: natural speed and richer vocabulary"}`}
function buildSystem(scen,duo){const who=duo?`Two learners share this scene: ${levelText("Anthony",S.profiles.Anthony.level)}; ${levelText("Amy",S.profiles.Amy.level)}. Each user message is prefixed with the speaker's name. Address the person whose name is shown in the latest message, by name, and keep turns balanced between them.`:levelText(S.profile,me().level)+". Each user message is prefixed with their name.";
 return `You are Allez, a warm French conversation partner inside a learning app for a couple from Wales preparing for a Paris trip. Scenario: "${scen.t}" — you play ${scen.role}. ${who}
Rules: stay in the scene; ONE short turn at a time; end most turns with a question to keep them talking; if they answer in English, respond kindly and model the French they needed. Put a gentle correction or encouragement in "note" (English, max 18 words, null if nothing to say). After 6–10 good exchanges, bring the scene to a natural close and set "done" to true with a warm goodbye.
Reply ONLY with minified JSON, no markdown, no extra text: {"fr":"your French line","en":"English translation","phon":"simple phonetic respelling like bohn-ZHOOR, stressed syllable in CAPS","note":string or null,"done":boolean}`}
async function callAI(scen,duo,msgs){const url=S.settings.workerUrl.trim()||"https://api.anthropic.com/v1/messages";
 const model=S.settings.workerUrl.trim()?(S.settings.model||"claude-haiku-4-5-20251001"):DIRECT_MODEL;
 const body={model,max_tokens:1000,system:buildSystem(scen,duo),messages:msgs};
 const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
 if(!r.ok)throw new Error("HTTP "+r.status);
 const data=await r.json();
 const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
 const a=text.indexOf("{"),b=text.lastIndexOf("}");if(a<0||b<0)throw new Error("nojson");
 const d=JSON.parse(text.slice(a,b+1));if(!d.fr)throw new Error("badjson");aiOK=true;return d}

// ---------- CHAT (Parler & Duo) ----------
let CHAT=null; // {scen,duo,msgs:[],si,tries,useScript,busy,ended,turn}
function openScene(id,duo){const scen=SCENARIOS.find(x=>x.id===id);
 CHAT={scen,duo,msgs:[{role:"ai",d:{fr:scen.starter.f,en:scen.starter.e,phon:scen.starter.p,note:null,done:false}}],si:0,tries:0,useScript:false,busy:false,ended:false,turn:S.profile,userTurns:0};
 render();speak(scen.starter.f)}
function chatHistory(){return CHAT.msgs.map(m=>m.role==="ai"?{role:"assistant",content:JSON.stringify(m.d)}:{role:"user",content:m.who+": "+m.text})}
function firstKeys(id){return({cafe:[["cafe"],["the"],["biere"],["chocolat"],["creme"],["croissant"],["voudrais"],["bonjour"]],boul:[["baguette"],["croissant"],["pain"],["bonjour"]],dir:[["eiffel"],["ou","est"],["cherche"],["oui"]]})[id]||[]}
function scriptStep(text){const id=CHAT.scen.id,steps=SCRIPTS[id];if(!steps||CHAT.si>=steps.length){CHAT.ended=true;return}
 const expect=CHAT.si===0?firstKeys(id):steps[CHAT.si-1].keys;
 const hint=CHAT.si===0?SCRIPT_FIRST_HINT[id]:steps[CHAT.si-1].hint;
 const n=norm(text);const hit=expect.length===0||expect.some(set=>set.every(w=>n.includes(w)));
 if(hit||CHAT.tries>=2){const st=steps[CHAT.si];CHAT.si++;CHAT.tries=0;
  CHAT.msgs.push({role:"ai",d:{f:st.ai.f,fr:st.ai.f,en:st.ai.e,phon:st.ai.p,note:hit?(CHAT.si>1||true?"👍 Nice — that worked.":null):"We'll move on — try the hint next time.",done:!!st.ai.done}});
  if(st.ai.done){CHAT.ended=true;if(CHAT.userTurns>=2)markDone()}
  speak(st.ai.f)}
 else{CHAT.tries++;CHAT.msgs.push({role:"hint",text:hint})}}
async function sendChat(){const inp=$("#chatIn");const text=(inp?inp.value:"").trim();if(!text||CHAT.busy||CHAT.ended)return;
 const who=CHAT.duo?CHAT.turn:S.profile;
 CHAT.msgs.push({role:"me",who,text});CHAT.userTurns++;if(CHAT.duo)CHAT.turn=CHAT.turn==="Anthony"?"Amy":"Anthony";
 if(inp)inp.value="";
 if(CHAT.useScript){scriptStep(text);render();return}
 CHAT.busy=true;render();
 try{const d=await callAI(CHAT.scen,CHAT.duo,chatHistory());
  CHAT.msgs.push({role:"ai",d:{...d,f:d.fr}});CHAT.busy=false;
  if(d.done){CHAT.ended=true;if(CHAT.userTurns>=3)markDone(CHAT.duo?["Anthony","Amy"]:null)}
  render();speak(d.fr)}
 catch(e){CHAT.busy=false;
  if(!aiOK&&SCRIPTS[CHAT.scen.id]&&!CHAT.duo){CHAT.useScript=true;toast("No AI connection — switching to the built-in scripted scene");scriptStep(text);render()}
  else{CHAT.msgs.push({role:"hint",text:"Couldn't reach the AI ("+(e.message||"error")+"). Check the endpoint in ⚙️, then try again."});render()}}}
async function micChat(){const btn=$("#chatMic");
 if(SR){try{btn&&btn.classList.add("live");const alts=await listen();btn&&btn.classList.remove("live");const v=alts[0]||"";const inp=$("#chatIn");if(inp){inp.value=v;inp.focus()}}catch(e){btn&&btn.classList.remove("live");toast(micErr(e))}return}
 recToggle((text,err)=>{if(err){toast("Speech check failed — "+(err.message||"try again"));return}if(!text){toast("Didn't catch that — try again");return}const inp=$("#chatIn");if(inp){inp.value=text;inp.focus()}},btn)}

let SES=null; // {q:[],i,phase,heard,isNew}
function startSession(cat){const p=me();const q=buildSession(p,cat);if(!q.length){toast("Nothing due — come back tomorrow or raise daily new cards in ⚙️");return}
 SES={q,i:0,phase:"front",heard:null};prepCard();render()}
function prepCard(){const p=me();const item=SES.q[SES.i];resetToday(p);
 const existed=!!p.srs[item.id];SES.isNew=!existed;SES.phase=SES.isNew?"back":"front";SES.heard=null;
 SES.dir=(!SES.isNew&&p.srs[item.id].reps>=2&&Math.random()<0.4)?"listen":"prod";
 if(SES.isNew){srsOf(p,item.id);p.today.newCount++;save()}
 if(SES.isNew||SES.dir==="listen")setTimeout(()=>say(item.id),350)}
function reveal(){SES.phase="back";render();say(SES.q[SES.i].id)}
async function micDrill(){const item=SES.q[SES.i];const btn=$("#drillMic");
 if(SR){
  try{btn&&btn.classList.add("live");const alts=await listen();btn&&btn.classList.remove("live");
   const r=wordMarks(item.f,alts);SES.heard={ok:passed(r),text:r.heard,marks:r.marks};reveal()}
  catch(e){btn&&btn.classList.remove("live");toast(micErr(e))}
  return}
 recToggle((text,err)=>{if(err){toast("Speech check failed — "+(err.message||"try again"));return}if(!text){toast("Didn't catch that — try again");return}
  const r=wordMarks(item.f,[text]);SES.heard={ok:passed(r),text:r.heard,marks:r.marks};reveal()},btn)}
function doGrade(g){const p=me();const item=SES.q[SES.i];grade(p,item.id,g);resetToday(p);p.today.cards++;
 if(g==="again"){SES.q.splice(Math.min(SES.q.length,SES.i+3),0,item)}
 SES.i++;
 if(SES.i>=SES.q.length){const n=p.today.cards;SES=null;if(n>=8)markDone();render();toast(n>=8?"Session complete — streak counted 🔥":"Session complete");return}
 prepCard();render()}

function frNum(n){if(n<0)return "moins "+frNum(-n);
 const u=["zéro","un","deux","trois","quatre","cinq","six","sept","huit","neuf","dix","onze","douze","treize","quatorze","quinze","seize","dix-sept","dix-huit","dix-neuf"];
 const t=["","","vingt","trente","quarante","cinquante","soixante"];
 if(n<20)return u[n];
 if(n<70){const d=Math.floor(n/10),r=n%10;if(r===0)return t[d];if(r===1)return t[d]+" et un";return t[d]+"-"+u[r]}
 if(n<80){const r=n-60;if(r===11)return "soixante et onze";return "soixante-"+u[r]}
 if(n<100){const r=n-80;if(r===0)return "quatre-vingts";return "quatre-vingt-"+u[r]}
 const h=Math.floor(n/100),r=n%100;const head=h===1?"cent":u[h]+" cent";
 if(r===0)return h===1?"cent":u[h]+" cents";return head+" "+frNum(r)}
function frPrice(e,c){const eu=n=>frNum(n)+" euro"+(n>1?"s":"");
 if(c===0)return eu(e);if(e===0)return frNum(c)+" centime"+(c>1?"s":"");return eu(e)+" "+frNum(c)}
function frTime(h,m){const hw=h===1?"une":frNum(h);const base=hw+" heure"+(h>1?"s":"");
 if(m===0)return base;if(m===15)return base+" et quart";if(m===30)return base+" et demie";
 if(m===45){const nh=h%12+1;const nhw=nh===1?"une":frNum(nh);return nhw+" heure"+(nh>1?"s":"")+" moins le quart"}
 return base+" "+frNum(m)}
const _rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function numQ(kind){
 if(kind==="mix")kind=["num","price","time"][_rnd(0,2)];
 if(kind==="num"){const n=Math.random()<0.6?_rnd(60,99):(Math.random()<0.8?_rnd(0,59):_rnd(100,160));
  const set=new Set([n]);for(const d of [n-10,n+10,n-20,n+20,n-1,n+1]){if(set.size>=4)break;if(d>=0&&d<=199&&d!==n)set.add(d)}
  while(set.size<4)set.add(_rnd(0,199));
  return{kind,say:frNum(n),fr:frNum(n),opts:_shuf([...set].slice(0,4)).map(v=>({label:String(v),correct:v===n}))}}
 if(kind==="price"){const sub=Math.random()<0.2;const e=sub?0:_rnd(1,49);
  const cPool=[0,5,10,15,20,25,40,50,60,75,80,90,95,99];let c=sub?[10,20,50,80,95,99][_rnd(0,5)]:cPool[_rnd(0,cPool.length-1)];
  const cents=e*100+c;const set=new Set([cents]);
  for(const d of [cents+10,cents-10,cents+100,cents-100,cents+50,cents-50,cents+1,cents-1]){if(set.size>=4)break;if(d>0&&d!==cents)set.add(d)}
  while(set.size<4)set.add(Math.max(5,cents+(_rnd(0,8)-4)*10));
  const fmt=x=>{const ee=Math.floor(x/100),cc=x%100;return cc===0?ee+" €":(ee>0?ee:"0")+","+String(cc).padStart(2,"0")+" €"};
  return{kind,say:frPrice(e,c),fr:frPrice(e,c),opts:_shuf([...set].slice(0,4)).map(v=>({label:fmt(v),correct:v===cents}))}}
 const h=_rnd(1,12),mP=[0,15,30,45,10,20],m=mP[_rnd(0,mP.length-1)];
 const key=(H,M)=>H+":"+String(M).padStart(2,"0");
 const set=new Map();set.set(key(h,m),true);
 for(const [H,M] of [[h,(m+15)%60],[h,(m+45)%60],[h%12+1,m],[(h+9)%12+1,m],[h,(m+30)%60]]){if(set.size>=4)break;const k=key(H,M);if(!set.has(k))set.set(k,false)}
 while(set.size<4){const k=key(_rnd(1,12),mP[_rnd(0,mP.length-1)]);if(!set.has(k))set.set(k,false)}
 const corr=key(h,m);
 return{kind,say:frTime(h,m),fr:frTime(h,m),opts:_shuf([...set.keys()].slice(0,4)).map(k=>({label:k,correct:k===corr}))}}
const NUMKINDS={num:["🔢","Numbers","0–160, heavy on the 70s/80s/90s"],price:["💶","Prices","euros & centimes, café-speed"],time:["🕒","Times","“à quelle heure ?”"],mix:["🎲","Mixed","a bit of everything"]};

   <div class="numgrid">${q.opts.map((o,i)=>{let cls="numopt";if(NUM.answered){if(o.correct)cls+=" correct";else if(i===NUM.picked)cls+=" wrong";else cls+=" dim"}return `<button class="${cls}" onclick="numPick(${i})">${esc(o.label)}</button>`}).join("")}</div>
   ${NUM.answered?`<div class="plaque mini" style="margin-top:16px;text-align:center"><div class="fr">${esc(q.fr)}</div></div>
    <button class="btn big" style="margin-top:14px" onclick="numNext()">${NUM.i+1>=NUM.total?"See score":"Next"} →</button>`:""}
  </div>`}
window.numStart=k=>{NUM.kind=k;NUM.i=0;NUM.score=0;NUM.answered=false;NUM.picked=-1;NUM.done=false;NUM.cur=numQ(k);render();setTimeout(()=>speak(NUM.cur.say),300)};

 <div class="field"><label>New phrases per day — ${p.newPerDay}</label><input type="range" min="4" max="25" step="1" value="${p.newPerDay}" oninput="setNew(this.value)"></div>
 <h3 style="margin-top:18px">AI conversation</h3>
 <div class="field"><label>Worker URL (see UPGRADES.md)</label><input id="setWorker" placeholder="https://allez.yourname.workers.dev" value="${esc(S.settings.workerUrl)}"><p class="muted" style="margin:6px 0 0">Powers live conversation, and on iPhone the 🎙️ pronunciation check too.</p></div>
 <div class="field"><label>Model</label><select id="setModel"><option value="claude-haiku-4-5-20251001" ${S.settings.model.includes("haiku")?"selected":""}>Haiku — fast & cheap</option><option value="claude-sonnet-4-6" ${S.settings.model.includes("sonnet")?"selected":""}>Sonnet — smartest</option></select></div>
 <button class="btn soft" onclick="testAI()">🤖 Test AI connection</button>
 <h3 style="margin-top:18px">Shared sync (Firebase)</h3>
 <p class="muted">Paste your Firebase config JSON — same pattern as Bookshelf. Until then, progress lives on this device only.</p>
 <div class="field"><textarea id="setFb" rows="3" placeholder='{"apiKey":"...","projectId":"...",...}'>${esc(S.settings.fb)}</textarea></div>
 <div class="field"><label>Household code</label><input id="setHouse" value="${esc(S.settings.house)}"></div>
 <p class="muted">Sync: ${esc(fbStatus)}</p>
 <button class="btn big" onclick="saveSettings()">Save settings</button>
 <button class="btn ghost big" style="margin-top:10px" onclick="resetProfile()">Reset ${S.profile}'s progress</button>
 <p class="muted" style="margin-top:14px;text-align:center">Allez ! v1 · made for Anthony & Amy · allez allez allez 🔴</p>`}
window.setWho=n=>{S.profile=n;S.chosen=true;save();renderSettings();render()};
window.setLevel=l=>{me().level=l;save();syncPush();renderSettings()};
window.setPhon=b=>{S.settings.phon=b;save();renderSettings()};
window.setRate=v=>{S.settings.rate=parseFloat(v);save()};
window.setVoice=v=>{S.settings.voiceURI=v;save()};
window.setNew=v=>{me().newPerDay=parseInt(v);save()};
window.resetProfile=async()=>{const n=S.profile;
 if(!confirm("Wipe "+n+"'s progress?"+(FB?" This clears the synced copy too.":"")))return;
 S.profiles[n]=freshProfile(n==="Anthony"?1:2);S.upd[n]=Date.now();
 try{localStorage.setItem("allez.v1",JSON.stringify(S))}catch(e){}
 if(FB){try{await FB.fs.setDoc(FB.prof(n),{data:S.profiles[n],up:S.upd[n]})}catch(e){}}
 location.reload()};
window.testAI=async()=>{const u=$("#setWorker").value.trim();if(!u){toast("Paste your Worker URL first");return}
 toast("Testing the worker…");
 try{const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:$("#setModel").value,max_tokens:30,messages:[{role:"user",content:"Reply with exactly: Bonjour Anthony et Amy !"}]})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(!t)throw new Error("empty reply");toast("✓ AI connected — "+t.slice(0,60))}
 catch(e){toast("✗ "+(e.message||"failed")+" — see UPGRADES.md")}};
window.saveSettings=async()=>{S.settings.workerUrl=$("#setWorker").value.trim();S.settings.model=$("#setModel").value;S.settings.fb=$("#setFb").value.trim();S.settings.house=$("#setHouse").value.trim()||"maison";save();$("#sheet").classList.remove("open");toast("Saved");if(S.settings.fb)initFB(false);render()};

// ---------- BOOT ----------
renderNav();render();
if(S.settings.fb)initFB(true);
if("serviceWorker"in navigator&&location.protocol==="https:"){try{navigator.serviceWorker.register("sw.js")}catch(e){}}
</script>
</body>
</html>
